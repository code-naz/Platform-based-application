<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2 - Layout 2 (Sidebar)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid;
        }
        
        .nav-section {
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            border-top: 4px solid #333;
            padding-top: 20px;
        }
        
        .sidebar {
            width: 150px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .sidebar-item {
            height: 30px;
            background-color: #888;
            border: 1px solid #333;
            margin-bottom: 30px;
        }
        
        .content {
            flex: 1;
            border: 2px solid #333;
            padding: 20px;
        }
        
        .content-line {
            height: 25px;
            border: 1px solid #333;
            margin-bottom: 10px;
        }
        
        .content-line:last-child {
            margin-bottom: 0;
        }
        
        .footer-section {
            margin-top: 20px;
            border-top: 4px solid #333;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="nav-section">
        Navigasi
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-item"></div>
            <div class="sidebar-item"></div>
            <div class="sidebar-item"></div>
            <div class="sidebar-item"></div>
        </div>
        
        <div class="content">
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
            <div class="content-line"></div>
        </div>
    </div>

    <div class="footer-section"></div>

</body>
</html>
