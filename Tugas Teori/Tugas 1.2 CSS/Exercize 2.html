<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2 - Layout 1 (Logo Top)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding: 20px;
            border: 2px solid #333;
        }
        
        .logo-box {
            width: 100px;
            height: 100px;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .header-right {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .header-line {
            width: 150px;
            height: 20px;
            border: 1px solid #333;
        }
        
        .nav-section {
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .content-section {
            border: 2px solid #333;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .content-line {
            height: 25px;
            border: 1px solid #333;
            margin-bottom: 10px;
        }
        
        .content-line:last-child {
            margin-bottom: 0;
        }
        
        .footer-section {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            border-top: 4px solid #333;
        }
        
        .footer-box {
            width: 80px;
            height: 80px;
            background-color: #888;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="logo-box">Logo</div>
        <div class="header-right">
            <div class="header-line"></div>
            <div class="header-line"></div>
            <div class="header-line"></div>
            <div class="header-line"></div>
            <div class="header-line"></div>
        </div>
    </div>

    <div class="nav-section">
        Navigasi
    </div>

    <div class="content-section">
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
        <div class="content-line"></div>
    </div>

    <div class="footer-section">
        <div class="footer-box"></div>
        <div class="footer-box"></div>
    </div>

</body>
</html>
